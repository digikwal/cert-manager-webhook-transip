name: release-charts
run-name: Release Helm Chart ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write # to push chart release and create a release (helm/chart-releaser-action)
      packages: write # needed for ghcr access
      id-token: write # needed for keyless signing

    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch history
        run: git fetch --prune --unshallow

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Update versions
        run: |
          chart_file="charts/cert-manager-webhook-transip/Chart.yaml"
          values_file="charts/cert-manager-webhook-transip/values.yaml"
          version="${GITHUB_REF_NAME#v}"

          sed -Ei "s|^(version: ).*|\\1${version}|" "${chart_file}"
          sed -Ei "s|^(appVersion: ).*|\\1\"${version}\"|" "${chart_file}"
          sed -Ei "s|^(  repository: ).*|\\1ghcr.io/${GITHUB_REPOSITORY_OWNER}/cert-manager-webhook-transip|" "${values_file}"
          sed -Ei "s|^(  tag: ).*|\\1${version}|" "${values_file}"

      - name: Install Helm
        uses: azure/setup-helm@v4
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: charts
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_GENERATE_RELEASE_NOTES: true

      # see https://github.com/helm/chart-releaser/issues/183
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push charts to GHCR
        run: |
          shopt -s nullglob
          for pkg in .cr-release-packages/*; do
            if [ -z "${pkg:-}" ]; then
              break
            fi
            helm push "${pkg}" "oci://ghcr.io/${GITHUB_REPOSITORY_OWNER}/charts"
          done
