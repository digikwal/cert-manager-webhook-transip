name: semantic-release
run-name: Semantic Release

on:
  push:
    branches:
      - main

concurrency:
  group: semantic-release-main
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 24.2.3
          extra_plugins: |
            @semantic-release/commit-analyzer@13.0.1
            @semantic-release/release-notes-generator@14.1.0
            @semantic-release/github@11.0.6
            conventional-changelog-conventionalcommits@8.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute version tags
        id: versions
        run: |
          set -euo pipefail
          version='${{ needs.release.outputs.version }}'
          major_minor="$(echo "${version}" | awk -F. '{print $1 "." $2}')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "major_minor=${major_minor}" >> "$GITHUB_OUTPUT"

      - name: Determine build platforms
        id: platforms
        env:
          BUILD_ARM: ${{ vars.BUILD_ARM || 'false' }}
        run: |
          if [ "${BUILD_ARM}" = "true" ]; then
            echo "value=linux/amd64,linux/arm64,linux/arm/v7" >> "$GITHUB_OUTPUT"
            echo "enable_qemu=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=linux/amd64" >> "$GITHUB_OUTPUT"
            echo "enable_qemu=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            name=ghcr.io/${{ github.repository_owner }}/cert-manager-webhook-transip
            name=${{ vars.DOCKERHUB_IMAGE || format('ghcr.io/{0}/cert-manager-webhook-transip', github.repository_owner) }},enable=${{ vars.DOCKERHUB_IMAGE != '' }}
          tags: |
            type=raw,value=${{ steps.versions.outputs.version }}
            type=raw,value=${{ steps.versions.outputs.major_minor }}

      - name: Set up QEMU
        if: steps.platforms.outputs.enable_qemu == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker Hub credentials
        id: dockerhub_creds
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Docker Hub
        if: vars.DOCKERHUB_IMAGE != '' && steps.dockerhub_creds.outputs.available == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ steps.platforms.outputs.value }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Update chart image and version
        run: |
          set -euo pipefail
          chart_file="charts/cert-manager-webhook-transip/Chart.yaml"
          values_file="charts/cert-manager-webhook-transip/values.yaml"
          version='${{ steps.versions.outputs.version }}'

          sed -Ei "s|^(version: ).*|\\1${version}|" "${chart_file}"
          sed -Ei "s|^(appVersion: ).*|\\1\"${version}\"|" "${chart_file}"
          sed -Ei "s|^(  repository: ).*|\\1ghcr.io/${GITHUB_REPOSITORY_OWNER}/cert-manager-webhook-transip|" "${values_file}"
          sed -Ei "s|^(  tag: ).*|\\1${version}|" "${values_file}"

      - name: Package Helm chart
        run: |
          set -euo pipefail
          mkdir -p .release-packages
          helm package charts/cert-manager-webhook-transip --destination .release-packages

      - name: Push Helm OCI chart to GHCR
        run: |
          set -euo pipefail
          shopt -s nullglob
          for pkg in .release-packages/*.tgz; do
            helm push "${pkg}" "oci://ghcr.io/${GITHUB_REPOSITORY_OWNER}/charts"
          done
