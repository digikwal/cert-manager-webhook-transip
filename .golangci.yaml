version: "2"
run:
  modules-download-mode: mod
linters:
  default: none
  enable:
    - bodyclose
    - depguard
    - dogsled
    - dupl
    - errcheck
    - exhaustive
    - funlen
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - revive
    - rowserrcheck
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    depguard:
      rules:
        main:
          files:
            - '!**/*_a _file.go'
          allow:
            - $gostd
            - k8s.io/apiextensions-apiserver
            - k8s.io/apimachinery
            - k8s.io/client-go/kubernetes
            - k8s.io/client-go/rest
            - k8s.io/api/core/v1
            - k8s.io/klog/v2
            - github.com/cert-manager/cert-manager
            - github.com/transip/gotransip/v6
            - github.com/demeesterdev/cert-manager-webhook-transip/transip
    gocritic:
      disabled-checks:
        - whyNoLint
        - wrapperFunc
      enabled-tags:
        - performance
        - style
        - experimental
    misspell:
      locale: US
    revive:
      rules:
        - name: var-naming
          disabled: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: main_test\.go
        text: may want to remove commented-out code
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/golangci/golangci-lint
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
